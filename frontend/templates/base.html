<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillPath — {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="20" height="20" rx="5" fill="#185FA5"/>
        <path d="M6 13l4-4-4-4M11 15h5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      SkillPath
    </a>
    <div class="sidebar-divider"></div>
    <p class="sidebar-label">Navigation</p>
    <ul class="nav-list">

      <li class="nav-item {% if active_page == 'import' %}active{% endif %}">
        <a href="/import-cours">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2h7l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"/>
            <path d="M10 2v3h3M8 8v4M6 10l2 2 2-2"/>
          </svg>
          Import cours
        </a>
      </li>

      <li class="nav-item {% if active_page == 'scan' %}active{% endif %}">
        <a href="/scan-code">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 4h12M2 8h12M2 12h8"/>
            <circle cx="13" cy="12" r="2.5"/>
            <path d="M14.8 13.8l1.5 1.5"/>
          </svg>
          Scanner du code
        </a>
      </li>

      <li class="nav-item {% if active_page == 'rapport' %}active{% endif %}">
        <a href="/rapport-jour">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="12" height="12" rx="2"/>
            <path d="M5 6h6M5 9h4"/>
          </svg>
          Rapport du jour
        </a>
      </li>

      <li class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
        <a href="/dashboard">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12l4-4 3 3 5-6"/>
          </svg>
          Ma progression
        </a>
      </li>
    </ul>
        <!-- Profil utilisateur -->
    <button class="sidebar-profile" id="profileTrigger" title="Modifier le profil">
      <div class="avatar" id="userAvatar">NP</div>
      <div class="profile-info">
        <span class="profile-name" id="userName">Nicolas P.</span>
        <span class="profile-role" id="userRole">Reconversion</span>
      </div>
    </button>
  </aside>

  <!-- ═══ MODALE PROFIL ═══ -->
  <div id="profilModal" class="cours-modal hidden" role="dialog" aria-modal="true" aria-labelledby="profilModalTitle">
    <div class="cours-modal-backdrop" data-close></div>
    <div class="cours-modal-box profil-modal-box">
      <div class="cours-modal-header">
        <span class="cours-modal-title" id="profilModalTitle">Modifier le profil</span>
        <button class="btn-icon" data-close aria-label="Fermer">✕</button>
      </div>
      <form class="cours-modal-body" id="profilForm">
        <label class="form-label" for="profilNameInput">Nom</label>
        <input class="form-input" id="profilNameInput" type="text" required maxlength="60">

        <label class="form-label" for="profilRoleInput">Métier</label>
        <input class="form-input" id="profilRoleInput" type="text" required maxlength="60">

        <button class="btn btn-primary mt-16" type="submit">Enregistrer</button>
      </form>
    </div>
  </div>

  <script>
    // ── Profil (mono-user, stocké côté backend en SQLite) ─
    async function chargerProfil() {
      try {
        const res = await fetch('/profil/');
        const profil = await res.json();
        appliquerProfil(profil);
      } catch { /* silencieux si backend down */ }
    }

    function appliquerProfil(profil) {
      document.getElementById('userName').textContent   = profil.name;
      document.getElementById('userRole').textContent    = profil.role;
      document.getElementById('userAvatar').textContent  = profil.initials;
    }

    document.getElementById('profileTrigger').addEventListener('click', () => {
      document.getElementById('profilNameInput').value = document.getElementById('userName').textContent;
      document.getElementById('profilRoleInput').value = document.getElementById('userRole').textContent;
      document.getElementById('profilModal').classList.remove('hidden');
    });

    document.getElementById('profilForm').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('profilNameInput').value.trim();
      const role = document.getElementById('profilRoleInput').value.trim();
      if (!name || !role) return;

      const res = await fetch('/profil/', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, role })
      });
      if (res.ok) {
        appliquerProfil(await res.json());
        document.getElementById('profilModal').classList.add('hidden');
      }
    });

    chargerProfil();
  </script>
  <!-- ═══ MAIN ═══ -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <!-- ═══ MODALE COURS (partagée) ═══ -->
  <div id="coursModal" class="cours-modal hidden" role="dialog" aria-modal="true" aria-labelledby="coursModalTitle">
    <div class="cours-modal-backdrop" data-close></div>
    <div class="cours-modal-box">
      <div class="cours-modal-header">
        <span class="cours-modal-title" id="coursModalTitle">Cours</span>
        <button class="btn-icon" data-close aria-label="Fermer">✕</button>
      </div>
      <div class="cours-modal-body" id="coursModalBody"></div>
    </div>
  </div>

  <script>
    // ── Modale « Cours à relire » ─────────────────────
    // Les tags .tag-cours[data-chunk] sont rendus par les pages ; on écoute
    // en délégation pour ne pas avoir à recâbler après chaque re-render.
    async function ouvrirCoursChunk(chunkId, titre) {
      const modal = document.getElementById('coursModal');
      const body  = document.getElementById('coursModalBody');
      document.getElementById('coursModalTitle').textContent = titre || 'Cours';
      body.textContent = 'Chargement…';
      modal.classList.remove('hidden');
      try {
        const res = await fetch(`/import/chunk?chunk_id=${encodeURIComponent(chunkId)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || 'Extrait indisponible.');
        }
        const data = await res.json();
        body.textContent = data.text;
      } catch (e) {
        body.textContent = e.message || "Impossible de charger cet extrait.";
      }
    }

    function fermerModal(modal) {
      modal.classList.add('hidden');
    }

    document.addEventListener('click', e => {
      const tag = e.target.closest('.tag-cours[data-chunk]');
      if (tag) { ouvrirCoursChunk(tag.dataset.chunk, tag.dataset.titre); return; }
      const closeTrigger = e.target.closest('[data-close]');
      if (closeTrigger) fermerModal(closeTrigger.closest('.cours-modal'));
    });
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      document.querySelectorAll('.cours-modal:not(.hidden)').forEach(fermerModal);
    });
  </script>

  {% block scripts %}{% endblock %}

</body>
</html>
